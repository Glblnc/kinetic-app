<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kinetic</title>
  <meta name="theme-color" content="#0a0a0b">
  <meta name="description" content="Kinetic, application de musculation, nutrition et progression avec coach IA.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/kinetic-logo.png">
  <link rel="apple-touch-icon" href="assets/kinetic-logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navigation principale">
      <div class="brand">
        <img src="assets/kinetic-logo.png" alt="Kinetic">
        <div>
          <strong>Kinetic</strong>
          <span>Coach fitness IA</span>
        </div>
      </div>

      <nav class="nav" data-nav>
        <button class="active" data-view-target="dashboard" title="Accueil">
          <span class="nav-icon" aria-hidden="true" data-icon="home"></span>
          Accueil
        </button>
        <button data-view-target="profile" title="Profil">
          <span class="nav-icon" aria-hidden="true" data-icon="user"></span>
          Profil
        </button>
        <button data-view-target="training" title="Entraînement">
          <span class="nav-icon" aria-hidden="true" data-icon="dumbbell"></span>
          Entraînement
        </button>
        <button data-view-target="nutrition" title="Nutrition">
          <span class="nav-icon" aria-hidden="true" data-icon="utensils"></span>
          Nutrition
        </button>
        <button data-view-target="progress" title="Progression">
          <span class="nav-icon" aria-hidden="true" data-icon="chart"></span>
          Progression
        </button>
        <button data-view-target="coach" title="Coach IA">
          <span class="nav-icon" aria-hidden="true" data-icon="bot"></span>
          Coach IA
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="mini-status">
          <b>Semaine en cours</b>
          <div class="progress-line" aria-hidden="true"><span id="weekProgressBar"></span></div>
          <span class="tag good" id="weekProgressText">0 / 3 séances</span>
        </div>
      </div>
    </aside>

    <main class="app-main">
      <header class="topbar">
        <div class="brand mobile-brand">
          <img src="assets/kinetic-logo.png" alt="Kinetic">
          <div>
            <strong>Kinetic</strong>
            <span>Coach fitness IA</span>
          </div>
        </div>

        <div class="screen-title desktop-title">
          <h1 id="screenHeading">Accueil</h1>
          <p id="screenSubtitle">Vue du jour</p>
        </div>

        <div class="top-actions">
          <span class="sync-pill" id="syncStatus">Local</span>
          <button class="icon-btn" id="themeToggle" title="Changer le thème" aria-label="Changer le thème">
            <span data-icon="moon"></span>
          </button>
          <button class="icon-btn" id="installBtn" title="Installer l’application" aria-label="Installer l’application">
            <span data-icon="download"></span>
          </button>
          <button class="btn primary" data-view-target="coach">
            <span data-icon="message"></span>
            Coach
          </button>
        </div>
      </header>

      <section class="view active" id="dashboard" data-title="Accueil" data-subtitle="Vue du jour">
        <div id="dashboardView"></div>
      </section>

      <section class="view" id="profile" data-title="Profil" data-subtitle="Programme personnalisé">
        <div id="profileView"></div>
      </section>

      <section class="view" id="training" data-title="Entraînement" data-subtitle="Programme adaptatif">
        <div id="trainingView"></div>
      </section>

      <section class="view" id="nutrition" data-title="Nutrition" data-subtitle="Calories, macros et journal">
        <div id="nutritionView"></div>
      </section>

      <section class="view" id="progress" data-title="Progression" data-subtitle="Mesures, records et régularité">
        <div id="progressView"></div>
      </section>

      <section class="view" id="coach" data-title="Coach IA" data-subtitle="Conseils généraux personnalisés">
        <div id="coachView"></div>
      </section>
    </main>
  </div>

  <nav class="mobile-nav" data-nav aria-label="Navigation mobile">
    <button class="active" data-view-target="dashboard" title="Accueil"><span class="nav-icon" aria-hidden="true" data-icon="home"></span><span>Accueil</span></button>
    <button data-view-target="profile" title="Profil"><span class="nav-icon" aria-hidden="true" data-icon="user"></span><span>Profil</span></button>
    <button data-view-target="training" title="Entraînement"><span class="nav-icon" aria-hidden="true" data-icon="dumbbell"></span><span>Train</span></button>
    <button data-view-target="nutrition" title="Nutrition"><span class="nav-icon" aria-hidden="true" data-icon="utensils"></span><span>Nutri</span></button>
    <button data-view-target="progress" title="Progression"><span class="nav-icon" aria-hidden="true" data-icon="chart"></span><span>Stats</span></button>
    <button data-view-target="coach" title="Coach IA"><span class="nav-icon" aria-hidden="true" data-icon="bot"></span><span>IA</span></button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js" defer></script>
</body>
</html>
